# =============================================================================
# Docker Compose - Postgres (Otimizado)
# =============================================================================

services:
  database_<nome-do-projeto>_:
    build:
      context: ../
      dockerfile: .devcontainer/Dockerfile.postgress
      target: dev
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_ENV=development
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=_<nome-do-projeto>_

volumes:
  postgres-data:
