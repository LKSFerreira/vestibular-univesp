# =============================================================================
# Docker Compose - Python (Otimizado com Multi-stage Cache)
# =============================================================================

services:
  backend_<nome-do-projeto>_:
    build:
      context: ../
      dockerfile: .docker/Dockerfile.python
      target: dev # Lembra dos estágios? Aqui chamamos só o ambiente de Dev!
    volumes:
      - ../:/app
    working_dir: /app
    stdin_open: true
    tty: true
    env_file:
      - ../.env
    environment:
      - PYTHON_ENV=development
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
