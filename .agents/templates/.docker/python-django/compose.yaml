# =============================================================================
# Docker Compose - Python com Django (Otimizado com UV e Multi-stage Cache)
# =============================================================================

services:
  backend_<nome-do-projeto>_:
    build:
      context: ../
      dockerfile: .docker/Dockerfile.python
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ../:/app
    working_dir: /app
    stdin_open: true
    tty: true
    env_file:
      - ../.env
    environment:
      - PYTHON_ENV=development
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - DEBUG=True
