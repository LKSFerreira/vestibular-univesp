# =============================================================================
# Docker Compose - JavaScript/TypeScript com Express (Otimizado com Multi-stage Cache)
# =============================================================================

services:
  app_<nome-do-projeto>_:
    build:
      context: ../
      dockerfile: .devcontainer/Dockerfile.node
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ../:/app
      - /app/node_modules
    working_dir: /app
    stdin_open: true
    tty: true
    env_file:
      - ../.env
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
