# =============================================================================
# Docker Compose - C++ (Otimizado com Multi-stage Cache)
# =============================================================================

services:
  app_<nome-do-projeto>_:
    build:
      context: ../
      dockerfile: .devcontainer/Dockerfile.cpp
      target: dev # A mágica acontece aqui: usamos só o estágio de desenvolvimento!
    volumes:
      - ../:/app
    working_dir: /app
    stdin_open: true
    tty: true
    env_file:
      - ../.env
    environment:
      - CPP_ENV=development
    depends_on:
      - database_<nome-do-projeto>_

volumes:
  postgres-data:
